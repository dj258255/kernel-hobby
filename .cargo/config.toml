# 베어메탈 타겟엔 미리 컴파일된 core 라이브러리가 없으므로,
# core/compiler_builtins를 소스에서 직접 빌드한다(rust-src 컴포넌트 필요).
[unstable]
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]
# 최신 nightly는 .json 커스텀 타겟에 이 플래그를 요구한다.
json-target-spec = true

# 커스텀 타겟으로 빌드.
# 내장 x86_64-unknown-none은 PIE(위치독립)라 부트로더 0.9가 못 읽으므로,
# PIE가 꺼진 커스텀 타겟(정적 비-PIE)을 쓴다.
[build]
target = "x86_64-anime_os.json"

# `cargo run` 하면 bootimage가 부팅 이미지를 만들고 QEMU로 띄워준다.
[target.'cfg(target_os = "none")']
runner = "bootimage runner"
